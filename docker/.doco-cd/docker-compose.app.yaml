---
# This file is not managed by doco-cd because it can't manage itself
# Instead it is deployed through the TrueNAS SCALE UI

configs:
  poll-config.yml:
    content: |
      - url: https://github.com/ishioni/homelab-ops.git
        reference: master
        interval: 3600
secrets:
  1pw_token:
    file: /mnt/SSD/Userhomes/movi/.config/doco-cd/1pw_token
  webhook_secret:
    file: /mnt/SSD/Userhomes/movi/.config/doco-cd/webhook_secret
networks:
  apps:
    name: apps

services:
  app:
    configs:
      - source: poll-config.yml
        target: /poll-config.yml
    container_name: doco-cd
    environment:
      HTTP_PORT: 8080
      LOG_LEVEL: info
      POLL_CONFIG_FILE: /poll-config.yml
      SECRET_PROVIDER: 1password
      SECRET_PROVIDER_ACCESS_TOKEN_FILE: /run/secrets/1pw_token
      SECRET_PROVIDER_CACHE_ENABLED: "true"
      SECRET_PROVIDER_CACHE_TTL: "6h"
      WEBHOOK_SECRET_FILE: /run/secrets/webhook_secret
      DEPLOY_CONFIG_BASE_DIR: ./docker/truenas/
    healthcheck:
      test:
        - CMD
        - /doco-cd
        - healthcheck
      start_period: 15s
      interval: 30s
      timeout: 5s
      retries: 3
    image: ghcr.io/kimdre/doco-cd:0.95.0@sha256:cc7f6a37a4f8714b615731fe11517d5ba02db25bc1c66640229b61a37fe93caa
    ports:
      - 8080:8080
      - 9120:9120
    restart: unless-stopped
    secrets:
      - 1pw_token
      - webhook_secret
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - data:/data
volumes:
  data: {}
