---
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/refs/heads/main/schema/compose-spec.json
services:
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1@sha256:0f422f62c15f154af8d8572b23d623aebfb10cec73a5c654d18f911f3f9df241
    container_name: node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host/root
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.udev.data=/host/root/run/udev/data
      - --web.listen-address=0.0.0.0:9100
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      # - --no-collector.filesystem
      # - --no-collector.zfs
      # - --no-collector.filesystem
      # - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
      # - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$
    network_mode: host
    volumes:
      - /:/host/root:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
  smartctl-exporter:
    container_name: smartctl-exporter
    image: quay.io/prometheuscommunity/smartctl-exporter:v0.14.0
    ports:
      - 9633:9633
    privileged: true
    restart: unless-stopped
    user: root

  drm-exporter:
    image: ghcr.io/home-operations/drm-exporter:0.2.5@sha256:59bc8e28a493c3303a2f486d34a9065c0ce9fe1679d75118649ed5c51dcf2137
    container_name: drm-exporter
    restart: unless-stopped
    user: root
    environment:
      DRM_EXPORTER_PORT: 9087
      DRM_EXPORTER_INTERVAL_SECONDS: 5
      RUST_LOG: info
    ports:
      - 9087:9087
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /sys:/sys:ro
