---
services:
  rustfs-cdn:
    image: docker.io/rustfs/rustfs:1.0.0-beta.6@sha256:e620d37756fff072b10bf648c7bb9d370d7e91a928b7e6a5e1ac85bdfb4e4dab
    container_name: rustfscdn
    restart: unless-stopped
    environment:
      RUSTFS_SERVER_DOMAINS: ${S3_HOST}
      RUSTFS_REGION: "eu-central-1"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_OBS_ENDPOINT: http://otel-collector:4318
      RUSTFS_OBS_SERVICE_NAME: rustfs-cdn
      RUSTFS_OBS_TRACES_EXPORT_ENABLED: "false"
      RUSTFS_OBS_LOGS_EXPORT_ENABLED: "false"
      RUSTFS_OBS_PROFILING_EXPORT_ENABLED: "false"
    networks:
      apps:
    expose:
      - &s3port 9000
      - &consoleport 9001
    volumes:
      - ${DATA_PATH}:/data
    labels:
      dexd.enabled: "true"
      traefik.enable: "true"
      # S3
      traefik.http.services.rcdn.loadbalancer.server.port: *s3port
      traefik.http.routers.rcdn.entrypoints: https
      traefik.http.routers.rcdn.rule: Host(`${S3_HOST}`) || HostRegexp(`^.+\.${S3_HOST}$`)
      dexd.routers.rcdn.extra-hostnames: "*.${S3_HOST}"
      traefik.http.routers.rcdn.tls.certresolver: letsencrypt
      traefik.http.routers.rcdn.tls.domains[0].main: ${S3_HOST}
      traefik.http.routers.rcdn.tls.domains[0].sans: "*.${S3_HOST}"
      traefik.http.routers.rcdn.service: rcdn
      traefik.http.routers.rcdn.tls: "true"
      # Dashboard
      traefik.http.services.rcdnconsole.loadbalancer.server.port: *consoleport
      traefik.http.routers.rcdnconsole.entrypoints: https
      traefik.http.routers.rcdnconsole.rule: Host(`${CONSOLE_HOST}`)
      traefik.http.routers.rcdnconsole.service: rcdnconsole
      traefik.http.routers.rcdnconsole.tls: "true"

networks:
  apps:
    external: true
