---
services:
  docker-external-dns:
    image: ghcr.io/ishioni/dexd:v0.3.1@sha256:0572b1fc6a64508f0bf42da7dc60b9de9aad042cd2961e72d7de71ca483e8239
    container_name: dexd
    restart: unless-stopped
    environment:
      # Required
      UNIFI_HOST: ${UNIFI_HOST}
      UNIFI_API_KEY: ${UNIFI_TOKEN}
      DEFAULT_TARGET: ${DEFAULT_TARGET}
      UNIFI_INSECURE_SKIP_VERIFY: false
      TXT_PREFIX: leo.
      METRICS_ADDR: :4320
    ports:
      - "4320:4320"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
