---
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/refs/heads/main/schema/compose-spec.json
services:
  openwebrx:
    image: slechev/openwebrxplus-softmbe:1.2.113@sha256:ada7507e17e6e9bfbfe159ffa4ae176efd723672f5e9faceb340d83d750fb603
    container_name: openwebrx
    devices:
      - /dev/bus/usb:/dev/bus/usb
    restart: unless-stopped
    networks:
      apps:
    environment:
      OPENWEBRX_ADMIN_USER: ${OWRX_USER}
      OPENWEBRX_ADMIN_PASSWORD: ${OWRX_PASSWORD}
      TZ: Europe/Warsaw
    expose:
      - ${APP_PORT}
    volumes:
      - owrx_etc:/etc/openwebrx
      - owrx_var:/var/lib/openwebrx
      - owrx_plugins:/usr/lib/python3/dist-packages/htdocs/plugins
    labels:
      traefik.enable: "true"
      traefik.http.services.owrx.loadbalancer.server.port: ${APP_PORT}
      traefik.http.routers.owrx.entrypoints: https
      traefik.http.routers.owrx.rule: Host(`${HOST}`)
      traefik.http.routers.owrx.tls: true
      traefik.http.routers.owrx.service: owrx

networks:
  apps:
    external: true

volumes:
  owrx_etc:
  owrx_var:
  owrx_plugins:
