apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubectl-mcp-read-all
rules:
  - apiGroups: [""]
    resources:
      [
        "pods",
        "nodes",
        "services",
        "namespaces",
        "configmaps",
        "persistentvolumes",
        "persistentvolumeclaims",
        "endpoints",
        "resourcequotas",
        "limitranges",
        "serviceaccounts",
        "events",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes", "grpcroutes", "tcproutes", "tlsroutes", "referencegrants"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources:
      [
        "buckets",
        "externalartifacts",
        "gitrepositories",
        "helmcharts",
        "helmrepositories",
        "ocirepositories",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["notification.toolkit.fluxcd.io"]
    resources: ["alerts", "providers", "receivers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["external-secrets.io"]
    resources:
      [
        "externalsecrets",
        "clusterexternalsecrets",
        "clusterpushsecrets",
        "clustersecretstores",
        "pushsecrets",
        "secretstores",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests", "certificates", "clusterissuers", "issuers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["toolhive.stacklok.dev"]
    resources:
      [
        "embeddingservers",
        "mcpauthzconfigs",
        "mcpexternalauthconfigs",
        "mcpgroups",
        "mcpoidcconfigs",
        "mcpregistries",
        "mcpremoteproxies",
        "mcpserverentries",
        "mcpservers",
        "mcptelemetryconfigs",
        "mcptoolconfigs",
        "mcpwebhookconfigs",
        "virtualmcpcompositetooldefinitions",
        "virtualmcpservers",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["monitoring.coreos.com"]
    resources:
      [
        "alertmanagerconfigs",
        "alertmanagers",
        "podmonitors",
        "probes",
        "prometheusagents",
        "prometheuses",
        "prometheusrules",
        "scrapeconfigs",
        "servicemonitors",
        "thanosrulers",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["grafana.integreatly.org"]
    resources:
      [
        "grafanaalertrulegroups",
        "grafanacontactpoints",
        "grafanadashboards",
        "grafanadatasources",
        "grafanafolders",
        "grafanalibrarypanels",
        "grafanamanifests",
        "grafanamutetimings",
        "grafananotificationpolicies",
        "grafananotificationpolicyroutes",
        "grafananotificationtemplates",
        "grafanas",
        "grafanaserviceaccounts",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.envoyproxy.io"]
    resources:
      [
        "backends",
        "backendtrafficpolicies",
        "clienttrafficpolicies",
        "envoyextensionpolicies",
        "envoypatchpolicies",
        "envoyproxies",
        "httproutefilters",
        "securitypolicies",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["backendtlspolicies", "gatewayclasses", "listenersets", "udproutes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cilium.io"]
    resources:
      [
        "ciliumbgpadvertisements",
        "ciliumbgpclusterconfigs",
        "ciliumbgpnodeconfigoverrides",
        "ciliumbgpnodeconfigs",
        "ciliumbgppeerconfigs",
        "ciliumbgppeeringpolicies",
        "ciliumcidrgroups",
        "ciliumclusterwidenetworkpolicies",
        "ciliumendpoints",
        "ciliumexternalworkloads",
        "ciliumidentities",
        "ciliuml2announcementpolicies",
        "ciliumloadbalancerippools",
        "ciliumlocalredirectpolicies",
        "ciliumnetworkpolicies",
        "ciliumnodeconfigs",
        "ciliumnodes",
        "ciliumpodippools",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources:
      [
        "backups",
        "clusterimagecatalogs",
        "clusters",
        "databaseroles",
        "databases",
        "failoverquorums",
        "imagecatalogs",
        "poolers",
        "publications",
        "scheduledbackups",
        "subscriptions",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["barmancloud.cnpg.io"]
    resources: ["objectstores"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["infra.contrib.fluxcd.io"]
    resources: ["terraforms"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kopiur.home-operations.com"]
    resources:
      [
        "clusterrepositories",
        "maintenances",
        "repositories",
        "repositoryreplications",
        "restores",
        "snapshotpolicies",
        "snapshots",
        "snapshotschedules",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["tuppr.home-operations.com"]
    resources: ["kubernetesupgrades", "talosupgrades"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["dragonflydb.io"]
    resources: ["dragonflies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubectl-mcp-read-all
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubectl-mcp-read-all
subjects:
  - kind: ServiceAccount
    name: kubectl-sa
    namespace: ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubectl-mcp-write-restricted
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubectl-mcp-write-restricted
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubectl-mcp-write-restricted
subjects:
  - kind: ServiceAccount
    name: kubectl-sa
    namespace: ai
