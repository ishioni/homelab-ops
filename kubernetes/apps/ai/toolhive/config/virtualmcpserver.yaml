---
# yaml-language-server: $schema=https://crd.movishell.pl/toolhive.stacklok.dev/virtualmcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: mcp-gateway
spec:
  authServerConfig:
    issuer: https://${HOSTNAME}
    signingKeySecretRefs:
      - name: toolhive-secret
        key: EC_SIGNING_KEY
    hmacSecretRefs:
      - name: toolhive-secret
        key: HMAC_KEY
    tokenLifespans:
      accessTokenLifespan: 1h
      refreshTokenLifespan: 168h
      authCodeLifespan: 10m
    upstreamProviders:
      - name: authentik
        type: oidc
        oidcConfig:
          issuerUrl: https://${AUTH_HOSTNAME}/application/o/toolhive/
          clientId: toolhive
          clientSecretRef:
            name: toolhive-secret
            key: OIDC_CLIENT_SECRET
          redirectUri: https://${HOSTNAME}/oauth/callback
          scopes:
            - openid
            - profile
            - email
            - offline_access
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
  telemetryConfigRef:
    name: prometheus
  groupRef:
    name: mcp-tools
  incomingAuth:
    type: oidc
    oidcConfigRef:
      name: authentik
      audience: https://${HOSTNAME}/mcp
      resourceUrl: https://${HOSTNAME}/mcp
      scopes:
        - openid
        - profile
        - email
        - offline_access
  outgoingAuth:
    source: discovered
  sessionStorage:
    address: dragonfly.database.svc.cluster.local:6379
    db: 9
    provider: redis
    keyPrefix: "vmcp-sessions:"
  # Keep Zed's cached MCP session alive across normal periods of inactivity.
  # Remove this override once https://github.com/zed-industries/zed/issues/57180 is fixed.
  # podTemplateSpec replaces the container args list, so retain all operator-generated args here.
  podTemplateSpec:
    spec:
      containers:
        - name: vmcp
          args:
            - serve
            - --config=/etc/vmcp-config/config.yaml
            - --host=0.0.0.0
            - --port=4483
            - --session-ttl=168h
          env:
            - name: INSECURE_DISABLE_URL_VALIDATION
              value: "true"
