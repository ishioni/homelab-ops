---
# yaml-language-server: $schema=https://crd.movishell.pl/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: bazarr
spec:
  compression:
    compressor: zstd
  mover:
    cache:
      capacity: 1Gi
      mode: Ephemeral
      storageClassName: openebs-hostpath
    securityContext:
      runAsUser: 568
      runAsGroup: 5000
  repository:
    kind: ClusterRepository
    name: leo
  retention:
    keepLatest: 3
    keepHourly: 24
    keepDaily: 7
    keepWeekly: 4
  sources:
    - pvc:
        name: bazarr-config
  volumeSnapshotClassName: dcsi-nfs
---
# yaml-language-server: $schema=https://crd.movishell.pl/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: bazarr
spec:
  policyRef:
    name: bazarr
  schedule:
    cron: 0 2 * * *
---
# yaml-language-server: $schema=https://crd.movishell.pl/kopiur.home-operations.com/snapshot_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Snapshot
metadata:
  name: bazarr-oneshot
spec:
  policyRef:
    name: bazarr
  tags:
    reason: "test"
  deletionPolicy: Delete
---
# yaml-language-server: $schema=https://crd.movishell.pl/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: bazarr
spec:
  policy:
    onMissingSnapshot: Continue
  source:
    fromPolicy:
      name: bazarr
      offset: 0
  target:
    populator: {}
---
# yaml-language-server: $schema=https://crd.movishell.pl/core/persistentvolumeclaim_v1.json
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  annotations:
  name: bazarr-restore-test
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: dcsi-nfs
  resources:
    requests:
      storage: 1Gi
  dataSourceRef:
    name: bazarr
    kind: Restore
    apiGroup: kopiur.home-operations.com
