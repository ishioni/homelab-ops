---
# yaml-language-server: $schema=https://crd.movishell.pl/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app bazarr
  namespace: &namespace downloads
spec:
  components:
    - ../../../../components/authentik-proxy
    - ../../../../components/kopiur/backup
    - ../../../../components/volsync
  dependsOn:
    - name: postgres-cluster
      namespace: database
    - name: external-secrets
      namespace: security
    - name: dcsi-nfs
      namespace: storage
    - name: kopiur
      namespace: storage
    - name: volsync
      namespace: storage
  interval: 30m
  path: ./kubernetes/apps/downloads/bazarr/app
  postBuild:
    substitute:
      APP: *app
      APP_UID: "568"
      APP_GID: "5000"
      HOSTNAME: bazarr.${PUBLIC_DOMAIN}
      PVC_CLAIM: bazarr-config
      PVC_STORAGECLASS: &sc dcsi-nfs
      KOPIUR_SNAPSHOTCLASS: *sc
      KOPIUR_TIME: 0 2 * * *
      VOLSYNC_SNAPSHOTCLASS: *sc
      VOLSYNC_TIME: 0 2 * * *
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-ops
    namespace: flux-system
  targetNamespace: *namespace
