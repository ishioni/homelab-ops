---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/core/persistentvolume_v1.json
apiVersion: v1
kind: PersistentVolume
metadata:
  name: downloads-pvc
spec:
  capacity:
    storage: 4000Gi
  volumeMode: Filesystem
  accessModes: ["ReadWriteMany"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    server: "${CONFIG_TRUENAS_IP}"
    path: /mnt/HDD/Media
  mountOptions: ["nfsvers=4.2", "nconnect=8", "hard", "noatime", "nodiratime"]
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/core/persistentvolumeclaim_v1.json
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: downloads-pvc
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 4000Gi
  storageClassName: nfs
  volumeMode: Filesystem
  volumeName: downloads-pvc
