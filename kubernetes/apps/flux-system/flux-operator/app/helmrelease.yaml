---
# yaml-language-server: $schema=https://crd.movishell.pl/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
spec:
  chartRef:
    kind: OCIRepository
    name: flux-operator
  interval: 30m
  values:
    serviceMonitor:
      create: true
    web:
      httpRoute:
        enabled: true
        annotations:
        gatus.home-operations.com/endpoint: |-
          name: flux-operator
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        hostnames: ["${HOSTNAME}"]
      # configSecretName: flux-web-secret
      networkPolicy:
        create: false
