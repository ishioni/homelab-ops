---
# yaml-language-server: $schema=https://crd.movishell.pl/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &appname flux-operator
  namespace: &namespace flux-system
spec:
  targetNamespace: *namespace
  interval: 30m
  path: ./kubernetes/apps/flux-system/flux-operator/app
  postBuild:
    substitute:
      HOSTNAME: flux.${PRIVATE_DOMAIN}
  prune: false # Never delete this
  sourceRef:
    kind: GitRepository
    name: homelab-ops
    namespace: flux-system
  wait: false
