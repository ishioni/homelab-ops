---
# yaml-language-server: $schema=https://crd.movishell.pl/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name tofu-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    creationPolicy: Owner
    template:
      data:
        OP_CONNECT_HOST: http://onepassword-connect.security.svc.cluster.local:8080
        OP_CONNECT_TOKEN: "{{ .OP_CONNECT_TOKEN }}"
  dataFrom:
    - extract:
        key: op-connect
---
# yaml-language-server: $schema=https://crd.movishell.pl/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name tofu-s3-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    creationPolicy: Owner
    template:
      data:
        access_key: "{{ .username }}"
        secret_key: "{{ .password }}"
  dataFrom:
    - extract:
        key: rustfs
---
# yaml-language-server: $schema=https://crd.movishell.pl/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name tofu-branch-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    creationPolicy: Owner
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        # The `tofu-controller` 1Password item must provide these GitHub App fields.
        githubAppID: "{{ .APP_ID }}"
        githubAppInstallationID: "{{ .INSTALLATION_ID }}"
        githubAppPrivateKey: "{{ .PRIVATE_KEY }}"
  dataFrom:
    - extract:
        key: github-bot
