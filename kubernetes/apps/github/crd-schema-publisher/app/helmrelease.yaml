---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.5.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crd-schema-publisher
spec:
  chartRef:
    kind: OCIRepository
    name: crd-schema-publisher
  interval: 30m
  values:
    controllers:
      crd-schema-publisher:
        strategy: RollingUpdates
        annotations:
          secret.reloader.stakater.com/reload: &secret crd-schema-publisher
        containers:
          app:
            image:
              repository: ghcr.io/sholdee/crd-schema-publisher
              tag: v2026.0411.051355@sha256:0b7335987a3ee09c668fa84e1432213f91b4afd106133d655773d1b9da8b11c8
            env:
              CF_PAGES_PROJECT: homelab-schema
              POD_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.name
              POD_NAMESPACE:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
            envFrom:
              - secretRef:
                  name: *secret
            probes:
              liveness:
                enabled: true
                custom: true
                path: /healthz
                port: &port 8080
              readiness:
                enabled: true
                custom: true
                path: /readyz
                port: *port
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: [ALL]
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
    persistence:
      output:
        type: emptyDir
