---
# yaml-language-server: $schema=https://crd.movishell.pl/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
spec:
  chartRef:
    kind: OCIRepository
    name: traefik
  interval: 30m
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: CustomResourceDefinition
              name: ".*\\.gateway\\.networking\\.k8s\\.io"
            patch: |-
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: placeholder
              $patch: delete
  values:
    api:
      insecure: true
    deployment:
      replicas: 1
    ingressClass:
      name: traefik
    gateway:
      enabled: false
    gatewayClass:
      enabled: false
    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
      kubernetesIngress:
        allowExternalNameServices: true
    ports:
      web:
        http:
          middlewares:
            - network-errorpages@kubernetescrd
      websecure:
        http:
          middlewares:
            - network-errorpages@kubernetescrd

    logs:
      access:
        enabled: true
