---
# yaml-language-server: $schema=https://crd.movishell.pl/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app changedetection
  namespace: &namespace selfhosted
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: dcsi-iscsi
      namespace: storage
    - name: volsync
      namespace: storage
  interval: 30m
  path: ./kubernetes/apps/selfhosted/changedetection/app
  postBuild:
    substitute:
      APP: *app
      HOSTNAME: changedetection.${PRIVATE_DOMAIN}
      APP_UID: "2000"
      APP_GID: "2000"
      PVC_CLAIM: changedetection-data
      PVC_CAPACITY: 1Gi
      PVC_STORAGECLASS: &sc dcsi-iscsi
      VOLSYNC_SNAPSHOTCLASS: *sc
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-ops
    namespace: flux-system
  targetNamespace: *namespace
