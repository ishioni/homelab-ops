---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: meshmonitor
spec:
  chartRef:
    kind: OCIRepository
    name: meshmonitor
  interval: 30m
  timeout: 10m
  values:
    controllers:
      meshmonitor:
        annotations:
          secret.reloader.stakater.com/reload: &secret meshmonitor-secret
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: *secret
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: &gid 1000
            fsGroup: *gid
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/yeraze/meshmonitor
              tag: 4.10.1
            env:
              MESHTASTIC_NODE_IP: 10.1.3.22
              MESHTASTIC_USE_TLS: "true"
              NODE_ENV: production
              PORT: &port 3001
              TRUST_PROXY: "true"
              COOKIE_SECURE: "true"
              ALLOWED_ORIGINS: https://${HOSTNAME}
              TZ: ${CONFIG_TIMEZONE}
              # LOG_LEVEL: debug
            envFrom:
              - secretRef:
                  name: *secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 1
                  periodSeconds: 5
                  successThreshold: 1
                  failureThreshold: 15
            resources:
              requests:
                cpu: 50m
                memory: 500Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              runAsNonRoot: true
              capabilities: {drop: ["ALL"]}
    service:
      app:
        controller: meshmonitor
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/enabled: "false"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Selfhosted
          gethomepage.dev/name: Meshmonitor
          gethomepage.dev/icon: meshtastic.svg
        hostnames: ["${HOSTNAME}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
    persistence:
      data:
        type: emptyDir
