---
# yaml-language-server: $schema=https://crd.movishell.pl/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app navidrome
  namespace: &namespace selfhosted
spec:
  components:
    - ../../../../components/authentik-proxy
    - ../../../../components/kopiur/backup
  dependsOn:
    - name: postgres-cluster
      namespace: database
    - name: external-secrets
      namespace: security
    - name: dcsi-iscsi
      namespace: storage
    - name: kopiur
      namespace: storage
  interval: 30m
  path: ./kubernetes/apps/selfhosted/navidrome/app
  postBuild:
    substitute:
      APP: *app
      HOSTNAME: navidrome.${PUBLIC_DOMAIN}
      APP_UID: "568"
      APP_GID: "5000"
      PVC_CLAIM: navidrome-config
      PVC_CAPACITY: 5Gi
      KOPIUR_CAPACITY: 5Gi
      PVC_STORAGECLASS: &sc dcsi-iscsi
      KOPIUR_SNAPSHOTCLASS: *sc
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-ops
    namespace: flux-system
  targetNamespace: *namespace
