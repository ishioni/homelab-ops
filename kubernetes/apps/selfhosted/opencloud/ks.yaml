---
# yaml-language-server: $schema=https://crd.movishell.pl/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app opencloud
  namespace: selfhosted
spec:
  components:
    - ../../../../components/kopiur/backup
  dependsOn:
    - name: external-secrets
      namespace: security
    - name: dcsi-nfs
      namespace: storage
    - name: kopiur
      namespace: storage
  interval: 30m
  path: ./kubernetes/apps/selfhosted/opencloud/app
  postBuild:
    substitute:
      APP: *app
      HOSTNAME: opencloud.${PUBLIC_DOMAIN}
      AUTH_HOSTNAME: auth.${PUBLIC_DOMAIN}
      APP_UID: "1000"
      APP_GID: "1000"
      PVC_CLAIM: opencloud-data
      PVC_CAPACITY: &size 20Gi
      KOPIUR_CAPACITY: *size
      PVC_STORAGECLASS: &sc dcsi-nfs
      KOPIUR_SNAPSHOTCLASS: *sc
      PVC_ACCESSMODES: ReadWriteMany
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-ops
    namespace: flux-system
  targetNamespace: selfhosted
  wait: false
