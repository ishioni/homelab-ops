---
# yaml-language-server: $schema=https://crd.movishell.pl/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app paperless
  namespace: &namespace selfhosted
spec:
  components:
    - ../../../../components/kopiur/backup
  dependsOn:
    - name: postgres-cluster
      namespace: database
    - name: dragonfly-cluster
      namespace: database
    - name: external-secrets
      namespace: security
    - name: dcsi-nfs
      namespace: storage
    - name: kopiur
      namespace: storage
  interval: 30m
  path: ./kubernetes/apps/selfhosted/paperless/app
  postBuild:
    substitute:
      APP: *app
      HOSTNAME: documents.${PRIVATE_DOMAIN}
      APP_UID: "568"
      APP_GID: "568"
      PVC_CLAIM: paperless-data
      PVC_CAPACITY: 5Gi
      KOPIUR_CAPACITY: 5Gi
      PVC_STORAGECLASS: &sc dcsi-nfs
      KOPIUR_SNAPSHOTCLASS: *sc
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-ops
    namespace: flux-system
  targetNamespace: *namespace
