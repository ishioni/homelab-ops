---
# yaml-language-server: $schema=https://crd.movishell.pl/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: ${APP}
spec:
  mover:
    podSecurityContext:
      runAsUser: ${APP_UID:=568}
      runAsGroup: ${APP_GID:=568}
      fsGroup: ${APP_GID:=568}
  policy:
    onMissingSnapshot: Continue
  source:
    fromPolicy:
      name: ${APP}
      offset: 0
  target:
    populator: {}
